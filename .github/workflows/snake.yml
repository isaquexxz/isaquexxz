name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: isaquexxz
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=A855F7&color_dots=#0D1117,#1A1B27,#3B1F7C,#7C3AED,#A855F7

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
